# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
early_access: false

reviews:
  profile: assertive
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false

  pre_merge_checks:
    title:
      mode: warning
      requirements: 'Use Conventional Commits style (type: short imperative summary).'
    description:
      mode: warning
    issue_assessment:
      mode: warning

chat:
  auto_reply: true
