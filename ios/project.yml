name: BefuIOS
options:
  bundleIdPrefix: dev.befu
settings:
  base:
    PRODUCT_NAME: Befu
    SWIFT_VERSION: 6.0
targets:
  Befu:
    type: application
    platform: iOS
    deploymentTarget: '16.0'
    sources:
      - path: App
    resources:
      - path: App/Resources
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.befu.ios
        INFOPLIST_FILE: App/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        # Set a valid Apple Developer Team ID for on-device signing.
        # Leave empty for simulator-only local runs.
        DEVELOPMENT_TEAM: ''
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    scheme:
      testTargets: []
