pre-commit:
  parallel: false
  commands:
    format-check:
      run: bun run format:check
    lint:
      run: bun run lint
    type-check:
      run: bun run check
    bridge-tests:
      run: bun run test:bridge
    rust-fmt-check:
      run: bun run rust:fmt:check

pre-push:
  parallel: false
  commands:
    quality-gate:
      run: bun run quality
